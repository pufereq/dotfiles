# cursor in .profile

[env]
LANG = "en_US.UTF-8"
LC_CTYPE = "en_US.UTF-8"
TERM = "alacritty"

[font]
size = 9.0

[font.normal]
family = "MonaspiceNe Nerd Font"
# family = "MesloLGS Nerd Font"
style = "Regular"

[terminal.shell]
program = "/usr/bin/zsh"

[window]
opacity = 0.8

[window.dimensions]
columns = 120
lines = 29

